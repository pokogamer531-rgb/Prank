<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Security Alert</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #0a0a0a;
      color: #c0c0c0;
      font-family: 'Courier New', Courier, monospace;
      font-size: 18px;
      line-height: 1.6;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      transition: background 0.8s ease;
    }

    .container {
      max-width: 680px;
      padding: 35px;
      border: 1px solid #333;
      background: #111;
      text-align: center;
      width: 90%;
    }

    .header {
      color: #ff4444;
      font-size: 26px;
      margin-bottom: 25px;
      border-bottom: 1px solid #333;
      padding-bottom: 12px;
    }

    .message {
      font-size: 19px;
      margin: 20px 0 30px;
      text-align: left;
      background: #000;
      padding: 20px;
      border: 1px solid #444;
      min-height: 140px;
    }

    .progress-container {
      margin: 30px 0;
      background: #222;
      padding: 4px;
      border: 1px solid #444;
    }

    .progress-bar {
      height: 22px;
      background: #ff4444;
      width: 0%;
      transition: width 0.15s linear;
      text-align: center;
      line-height: 22px;
      font-size: 15px;
      color: #000;
      font-weight: bold;
    }

    .status {
      margin-top: 10px;
      color: #ff6666;
      font-size: 17px;
    }

    .button {
      padding: 14px 40px;
      background: #1a1a1a;
      color: #c0c0c0;
      border: 1px solid #555;
      font-size: 18px;
      cursor: pointer;
      margin-top: 20px;
    }

    .footer {
      margin-top: 40px;
      font-size: 14px;
      color: #555;
    }
  </style>
</head>
<body>

  <div class="container" id="container">
    <div class="header">DATA DELETION IN PROGRESS</div>
    
    <div class="message" id="message">
All data is being permanently erased from this device.<br><br>

Photos • Videos • Messages • Contacts • Documents<br>
This process cannot be stopped.
    </div>

    <div class="progress-container">
      <div class="progress-bar" id="progressBar">0%</div>
    </div>

    <div class="status" id="status">Deleting files...</div>

    <button class="button" onclick="cancelDelete()" style="display:none;" id="cancelBtn">
      Cancel Deletion
    </button>

    <div class="footer">
      .  </div>
  </div>

  <script>
    const progressBar = document.getElementById('progressBar');
    const statusText = document.getElementById('status');
    const container = document.getElementById('container');
    const cancelBtn = document.getElementById('cancelBtn');
    let progress = 0;

    function startDeletion() {
      cancelBtn.style.display = 'block';

      const interval = setInterval(() => {
        progress += Math.random() * 8 + 3; // random speed between 3-11%
        if (progress > 100) progress = 100;

        progressBar.style.width = progress + '%';
        progressBar.textContent = Math.floor(progress) + '%';

        if (progress > 30) statusText.textContent = "Erasing photos and videos...";
        if (progress > 60) statusText.textContent = "Wiping messages and contacts...";
        if (progress > 85) statusText.textContent = "Finalizing deletion...";

        if (progress >= 100) {
          clearInterval(interval);
          completeDeletion();
        }
      }, 360); // speed of progress
    }

    function completeDeletion() {
      statusText.innerHTML = '<span style="color:#ff0000;">DELETION COMPLETE</span>';
      progressBar.style.background = '#660000';
      progressBar.textContent = '100%';

      // Screen goes completely black after a short delay
      setTimeout(() => {
        document.body.style.background = '#000000';
        container.style.display = 'none';
        
        // Fake "device turned off" effect
        setTimeout(() => {
          alert("💀 Device has been wiped.");
          
          // Optional: reload or go back to first page
       /* if (confirm("Want to see the prank again?")) {
            window.location.href = 'alert.html'; // change to your first file name if different
          } */
        }, 800); 
      }, 1200);
    } 

    function cancelDelete() {
      if (confirm("Are you sure you want to stop the deletion?")) {
        alert("All data has been deleted");
        window.location.href = 'alert.html'; // go back to first page
      }
    }

    // Start the fake deletion automatically when page loads
    window.onload = startDeletion;
  </script>
</body>
</html>
